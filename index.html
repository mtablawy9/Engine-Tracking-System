<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engine Tracking System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--sur:#161b22;--s2:#1c2230;--s3:#222b3a;
  --brd:#30363d;--acc:#f97316;--acch:#fb923c;
  --tx:#e6edf3;--mu:#8b949e;
  --co:#d97706;--cc:#16a34a;--cr:#dc2626;
  --bo:#1c1507;--bc:#071c0f;--br:#1c0707;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{display:flex;font-family:var(--sans);background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px;}

/* SIDEBAR */
#SB{width:272px;min-width:272px;background:var(--sur);border-right:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;}
.sb-brand{padding:15px 14px 12px;border-bottom:1px solid var(--brd);flex-shrink:0;}
.sb-brand h1{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);}
.sb-brand p{font-size:11px;color:var(--mu);margin-top:2px;}
#SB-scroll{flex:1;overflow-y:auto;padding:4px 0 10px;}

/* add-engine section */
.ae-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);user-select:none;border-bottom:1px solid var(--brd);}
.ae-hdr:hover,.ae-hdr.open{color:var(--acc);}
.ae-hdr .arr{margin-left:auto;font-size:9px;transition:transform .2s;}
.ae-hdr.open .arr{transform:rotate(90deg);}
.ae-body{display:none;padding:12px;border-bottom:1px solid var(--brd);}
.ae-body.open{display:block;}
.sb-lbl{display:block;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--mu);margin-bottom:3px;}
.sb-inp{width:100%;background:var(--bg);border:1px solid var(--brd);color:var(--tx);border-radius:5px;padding:6px 10px;font-size:12px;font-family:var(--sans);outline:none;margin-bottom:8px;display:block;}
.sb-inp:focus{border-color:var(--acc);}
.sb-btn{width:100%;padding:8px;background:var(--acc);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;}
.sb-btn:hover{background:var(--acch);}

/* groups/engines */
.grp-hdr{display:flex;align-items:center;gap:7px;padding:8px 14px;cursor:pointer;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;user-select:none;transition:color .15s;}
.grp-hdr:hover{color:var(--tx);}
.grp-hdr .arr{margin-left:auto;font-size:9px;transition:transform .2s;}
.grp-hdr.open .arr{transform:rotate(90deg);}
.grp-cnt{background:var(--s2);border:1px solid var(--brd);border-radius:10px;font-size:10px;padding:0 5px;font-family:var(--mono);color:var(--mu);}
.eng-list{display:none;}
.eng-list.open{display:block;}
.eng-item{display:flex;align-items:center;gap:7px;padding:7px 14px 7px 26px;cursor:pointer;font-size:12px;font-family:var(--mono);color:var(--mu);border-left:2px solid transparent;transition:all .15s;}
.eng-item:hover{color:var(--tx);background:var(--s2);}
.eng-item.active{color:var(--acc);border-left-color:var(--acc);background:rgba(249,115,22,.08);}
.alert-dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0;}
.alert-dot.open{background:var(--co);box-shadow:0 0 5px var(--co);}
.alert-dot.overdue{background:var(--cr);box-shadow:0 0 6px var(--cr);}

/* MAIN */
#MAIN{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{padding:13px 22px;border-bottom:1px solid var(--brd);background:var(--sur);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.topbar-t{font-size:13px;font-weight:600;color:var(--mu);letter-spacing:.06em;text-transform:uppercase;}
#CNT{flex:1;overflow-y:auto;padding:22px;}

/* welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center;color:var(--mu);}
.welcome .wi{font-size:48px;margin-bottom:14px;}
.welcome h2{font-size:18px;font-weight:600;color:var(--tx);margin-bottom:6px;}

/* engine area */
.eng-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px;}
.eng-meta h3{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--tx);}
.chips{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.chip{font-size:11px;font-family:var(--mono);background:var(--s2);border:1px solid var(--brd);border-radius:4px;padding:3px 8px;color:var(--mu);}

/* dashboard */
.dash{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.stat{padding:12px 14px;border-radius:8px;border:1px solid var(--brd);}
.stat.o{background:var(--bo);border-color:var(--co);}
.stat.c{background:var(--bc);border-color:var(--cc);}
.stat.r{background:var(--br);border-color:var(--cr);}
.stat-l{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.stat.o .stat-l{color:var(--co);}
.stat.c .stat-l{color:var(--cc);}
.stat.r .stat-l{color:var(--cr);}
.stat-n{font-size:28px;font-weight:700;font-family:var(--mono);margin-top:2px;color:var(--tx);}

/* tabs */
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--brd);margin-bottom:18px;}
.tab{padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;color:var(--mu);background:transparent;transition:all .15s;position:relative;bottom:-1px;}
.tab:hover{color:var(--tx);}
.tab.active{color:var(--acc);border-color:var(--brd);border-bottom-color:var(--bg);background:var(--bg);}

/* inputs */
input[type=text],input[type=date],select,textarea{background:var(--bg);border:1px solid var(--brd);color:var(--tx);border-radius:6px;padding:7px 11px;font-size:13px;font-family:var(--sans);outline:none;transition:border-color .15s;}
input[type=text]:focus,input[type=date]:focus,select:focus,textarea:focus{border-color:var(--acc);}
input[type=date]{color-scheme:dark;}
textarea{resize:vertical;min-height:56px;}

/* buttons */
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--sans);transition:all .15s;}
.btn-p{background:var(--acc);color:#fff;}.btn-p:hover{background:var(--acch);}
.btn-g{background:var(--s2);color:var(--tx);border:1px solid var(--brd);}.btn-g:hover{border-color:var(--acc);color:var(--acc);}
.btn-d{background:var(--br);color:var(--cr);border:1px solid var(--cr);}.btn-d:hover{background:var(--cr);color:#fff;}
.btn-ok{background:var(--bc);color:var(--cc);border:1px solid var(--cc);}.btn-ok:hover{background:var(--cc);color:#fff;}
.btn-sm{padding:4px 10px;font-size:11px;}
.ibtn{background:none;border:none;color:var(--mu);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:4px;transition:all .15s;}
.ibtn:hover{color:var(--cr);background:var(--br);}

/* collapsible trigger */
.coll-t{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border:1px dashed var(--brd);border-radius:6px;color:var(--mu);font-size:12px;font-weight:600;margin-bottom:10px;transition:all .15s;user-select:none;}
.coll-t:hover,.coll-t.open{border-color:var(--acc);color:var(--acc);}
.coll-t .arr{margin-left:auto;font-size:10px;transition:transform .2s;}
.coll-t.open .arr{transform:rotate(90deg);}
.coll-b{display:none;background:var(--sur);border:1px solid var(--brd);border-radius:6px;padding:14px;margin-bottom:12px;}
.coll-b.open{display:block;}

/* section header */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.sec-hdr h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--acc);}
.ftabs{display:flex;gap:3px;margin-left:auto;}
.ft{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--brd);background:transparent;color:var(--mu);font-family:var(--sans);transition:all .15s;}
.ft:hover{color:var(--tx);}
.ft.active{background:var(--acc);border-color:var(--acc);color:#fff;}

/* trend card */
.tc{background:var(--sur);border:1px solid var(--brd);border-radius:8px;margin-bottom:14px;overflow:hidden;}
.tc.closed{border-color:var(--cc);background:#0a1a10;}
.tc-hdr{display:flex;align-items:center;gap:8px;padding:11px 14px;background:var(--s2);border-bottom:1px solid var(--brd);flex-wrap:wrap;}
.tc.closed .tc-hdr{background:rgba(22,163,74,.07);}
.tc-title{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--tx);}
.tc-cnt{font-size:10px;color:var(--mu);font-family:var(--mono);}
.closed-bdg{font-size:10px;font-weight:700;background:var(--bc);color:var(--cc);border:1px solid var(--cc);border-radius:3px;padding:2px 7px;}

/* trend details */
.td-wrap{padding:12px 14px;border-bottom:1px solid var(--brd);}
.td-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.td-full{grid-column:1/-1;}
.fl-lbl{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);margin-bottom:3px;}
.fl-inp{width:100%;}
.vv{font-size:13px;color:var(--tx);min-height:20px;line-height:1.5;padding:2px 0;}
.vv.empty{color:var(--mu);font-style:italic;}
.edit-btns{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid var(--brd);}

/* actions */
.act-wrap{padding:10px 14px;}
.act-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:8px;}
.act-blk{background:var(--s2);border:1px solid var(--brd);border-radius:6px;margin-bottom:8px;overflow:hidden;}
.act-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none;transition:background .12s;}
.act-hdr:hover{background:var(--s3);}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sdot.open{background:var(--co);}
.sdot.closed{background:var(--cc);}
.sdot.overdue{background:var(--cr);box-shadow:0 0 5px var(--cr);}
.act-txt{font-size:13px;color:var(--tx);flex:1;}
.sbdg{font-size:10px;font-weight:700;letter-spacing:.07em;padding:2px 6px;border-radius:3px;flex-shrink:0;}
.sbdg.open{background:var(--bo);color:var(--co);border:1px solid var(--co);}
.sbdg.closed{background:var(--bc);color:var(--cc);border:1px solid var(--cc);}
.sbdg.overdue{background:var(--br);color:var(--cr);border:1px solid var(--cr);}
.act-exp{display:none;border-top:1px solid var(--brd);}
.act-exp.open{display:block;}
.act-body{padding:10px 12px;}
.act-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
.mtag{font-size:11px;font-family:var(--mono);color:var(--mu);}
.resp-list{margin-bottom:8px;}
.resp-row{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;background:var(--bg);border:1px solid var(--brd);border-radius:5px;margin-bottom:5px;}
.resp-arr{color:var(--acc);font-size:11px;flex-shrink:0;margin-top:2px;}
.resp-txt{font-size:12px;color:var(--tx);flex:1;}
.resp-dt{font-size:10px;color:var(--mu);font-family:var(--mono);flex-shrink:0;margin-top:2px;}
.del-r{background:none;border:none;color:var(--mu);cursor:pointer;font-size:11px;padding:0 3px;}
.del-r:hover{color:var(--cr);}
.add-resp{display:flex;gap:6px;margin-bottom:8px;}
.add-resp input{flex:1;}
.act-edit{display:none;padding:9px 12px;border-top:1px solid var(--brd);background:rgba(0,0,0,.25);}
.act-edit.open{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end;}
.act-btns{display:flex;gap:5px;padding:7px 12px;border-top:1px solid var(--brd);}
.add-act-wrap{padding:0 14px 12px;}
.add-act-body{display:none;background:var(--s2);border:1px solid var(--brd);border-radius:6px;padding:12px;}
.add-act-body.open{display:block;}
.add-act-grid{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;margin-top:8px;}

/* mods */
.mod-card{background:var(--sur);border:1px solid var(--brd);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.mod-hdr{display:flex;align-items:center;gap:8px;padding:11px 14px;background:var(--s2);border-bottom:1px solid var(--brd);}
.mod-ref{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--acc);}
.mod-ttl{font-size:13px;color:var(--tx);flex:1;}
.tbdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;border:1px solid;}
.tbdg.SB{color:#60a5fa;border-color:#60a5fa;background:rgba(96,165,250,.1);}
.tbdg.MOD{color:#a78bfa;border-color:#a78bfa;background:rgba(167,139,250,.1);}
.tbdg.AD{color:#f87171;border-color:#f87171;background:rgba(248,113,113,.1);}
.tbdg.EO{color:#34d399;border-color:#34d399;background:rgba(52,211,153,.1);}
.mod-body{padding:12px 14px;}
.mod-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:8px;}
.mod-fl label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mu);display:block;margin-bottom:2px;}
.mod-fl .val{font-size:12px;color:var(--tx);font-family:var(--mono);}
.mod-notes{font-size:12px;color:var(--mu);line-height:1.5;}
.add-mod-g1{display:grid;grid-template-columns:90px 1fr 1fr 1fr;gap:8px;margin-bottom:8px;align-items:end;}
.add-mod-g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.grp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin:14px 0 7px;}
.empty-s{text-align:center;padding:48px 20px;color:var(--mu);}
.empty-s .ei{font-size:38px;margin-bottom:10px;}
.empty-s h3{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:5px;}
.empty-s p{font-size:12px;}
.pb{padding-bottom:24px;}
</style>
</head>
<body>

<div id="SB">
  <div class="sb-brand">
    <h1>Engine Tracker</h1>
    <p>Trend &amp; Modification Management</p>
  </div>
  <div id="SB-scroll"></div>
</div>

<div id="MAIN">
  <div class="topbar">
    <span class="topbar-t" id="TB-title">Select an Engine</span>
    <div id="TB-actions"></div>
  </div>
  <div id="CNT">
    <div class="welcome">
      <div class="wi">✈️</div>
      <h2>No engine selected</h2>
      <p>Select an engine from the sidebar, or open "Add Engine" to register one.</p>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────
let DB  = JSON.parse(localStorage.getItem("etv5") || "[]");
let cur = { gi:null, ei:null };
let ui  = {
  addEngOpen:false, addTrendOpen:false, addModOpen:false,
  filter:"ALL", tab:"trends",
  editTrend:{}, expandAct:{}, editAct:{}, addActOpen:{}
};

const save  = () => localStorage.setItem("etv5", JSON.stringify(DB));
const eng   = () => DB[cur.gi].engines[cur.ei];
const today = () => new Date().toLocaleDateString("en-GB");
const $     = id => document.getElementById(id);
const val   = id => { const e=$(id); return e ? e.value.trim() : ""; };
const esc   = s  => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── STATUS ──────────────────────────────────────────
function status(a) {
  if ((a.responses||[]).length) return "closed";
  if (a.dueDate && new Date(a.dueDate) < new Date()) return "overdue";
  return "open";
}
function engAlert(e) {
  let od=false, op=false;
  for (const t of (e.trends||[])) {
    if (t.closed) continue;
    for (const a of (t.actions||[])) {
      const s=status(a);
      if (s==="overdue") { od=true; break; }
      if (s==="open") op=true;
    }
    if (od) break;
  }
  return od?"overdue":op?"open":"ok";
}

// ── SIDEBAR ──────────────────────────────────────────
// KEY INSIGHT: we use a single onclick on #SB-scroll (event delegation)
// No addEventListener after innerHTML — that's what was broken.

function renderSidebar() {
  let html = `
    <div class="ae-hdr ${ui.addEngOpen?"open":""}" data-action="toggle-ae">
      <span>➕</span><span>Add Engine</span><span class="arr">▶</span>
    </div>
    <div class="ae-body ${ui.addEngOpen?"open":""}">
      <label class="sb-lbl">Engine Model</label>
      <input class="sb-inp" id="f-model" placeholder="e.g. CFM56-7B">
      <label class="sb-lbl">P/N</label>
      <input class="sb-inp" id="f-pn" placeholder="Part Number">
      <label class="sb-lbl">S/N</label>
      <input class="sb-inp" id="f-sn" placeholder="Serial Number">
      <label class="sb-lbl">BS</label>
      <input class="sb-inp" id="f-bs" placeholder="Build Standard">
      <button class="sb-btn" data-action="add-engine">+ Add Engine</button>
    </div>`;

  if (DB.length === 0) {
    html += `<div style="padding:16px 14px;font-size:11px;color:var(--mu);">No engines registered yet.</div>`;
  } else {
    DB.forEach((g, gi) => {
      html += `<div class="grp-hdr ${g._open?"open":""}" data-action="toggle-grp" data-gi="${gi}">
        <span>${esc(g.description)}</span>
        <span class="grp-cnt">${g.engines.length}</span>
        <span class="arr">▶</span>
      </div>
      <div class="eng-list ${g._open?"open":""}">`;
      g.engines.forEach((e, ei) => {
        const al = engAlert(e);
        const active = cur.gi===gi && cur.ei===ei;
        html += `<div class="eng-item ${active?"active":""}" data-action="sel-eng" data-gi="${gi}" data-ei="${ei}">
          <span style="font-size:10px;color:var(--mu);">⬡</span>
          <span style="flex:1">${esc(e.sn)}</span>
          ${al!=="ok"?`<span class="alert-dot ${al}"></span>`:""}
        </div>`;
      });
      html += `</div>`;
    });
  }

  $("SB-scroll").innerHTML = html;
}

// Single delegated listener on the scroll container — set once, never re-added
$("SB-scroll").addEventListener("click", function(e) {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.dataset.action;

  if (action === "toggle-ae") {
    ui.addEngOpen = !ui.addEngOpen;
    renderSidebar();
    if (ui.addEngOpen) setTimeout(() => $("f-model") && $("f-model").focus(), 30);
    return;
  }
  if (action === "add-engine") { addEngine(); return; }
  if (action === "toggle-grp") {
    const gi = +el.dataset.gi;
    DB[gi]._open = !DB[gi]._open;
    renderSidebar();
    return;
  }
  if (action === "sel-eng") {
    selectEngine(+el.dataset.gi, +el.dataset.ei);
    return;
  }
});

// ── ENGINE SELECT / DELETE ────────────────────────────
function selectEngine(gi, ei) {
  cur = {gi, ei};
  ui.editTrend={}; ui.expandAct={}; ui.editAct={}; ui.addActOpen={};
  ui.addTrendOpen=false; ui.addModOpen=false; ui.filter="ALL"; ui.tab="trends";
  renderSidebar();
  renderMain();
}

function deleteEngine() {
  if (!confirm(`Delete engine ${eng().sn} and ALL its data?`)) return;
  DB[cur.gi].engines.splice(cur.ei, 1);
  if (!DB[cur.gi].engines.length) DB.splice(cur.gi, 1);
  cur={gi:null,ei:null};
  save(); renderSidebar();
  $("TB-title").textContent="Select an Engine";
  $("TB-actions").innerHTML="";
  $("CNT").innerHTML=`<div class="welcome"><div class="wi">✈️</div><h2>No engine selected</h2><p>Select or add an engine from the sidebar.</p></div>`;
}

// ── MAIN RENDER ──────────────────────────────────────
function renderMain() {
  const e = eng();
  let open=0, closed=0, overdue=0;
  (e.trends||[]).forEach(t => {
    if (t.closed) { closed += (t.actions||[]).length; return; }
    (t.actions||[]).forEach(a => {
      const s=status(a);
      if(s==="closed") closed++; else if(s==="overdue") overdue++; else open++;
    });
  });
  $("TB-title").textContent=`${e.sn} — ${DB[cur.gi].description}`;
  $("TB-actions").innerHTML=`<button class="btn btn-d btn-sm" onclick="deleteEngine()">🗑 Delete Engine</button>`;
  $("CNT").innerHTML=`
    <div class="eng-hdr">
      <div class="eng-meta">
        <h3>${esc(e.sn)}</h3>
        <div class="chips">
          <span class="chip">P/N: ${esc(e.pn)}</span>
          <span class="chip">BS: ${esc(e.bs)}</span>
          <span class="chip">${esc(DB[cur.gi].description)}</span>
        </div>
      </div>
    </div>
    <div class="dash">
      <div class="stat o"><div class="stat-l">Open</div><div class="stat-n">${open}</div></div>
      <div class="stat c"><div class="stat-l">Closed</div><div class="stat-n">${closed}</div></div>
      <div class="stat r"><div class="stat-l">Overdue</div><div class="stat-n">${overdue}</div></div>
    </div>
    <div class="tab-bar">
      <div class="tab ${ui.tab==="trends"?"active":""}" onclick="switchTab('trends')">📋 Trends</div>
      <div class="tab ${ui.tab==="mods"?"active":""}" onclick="switchTab('mods')">🔧 Modifications &amp; SBs</div>
    </div>
    <div id="TAB"></div>
    <div class="pb"></div>`;
  renderTab();
}

function switchTab(t) { ui.tab=t; renderTab(); }
function renderTab() { const tc=$("TAB"); if(tc) tc.innerHTML = ui.tab==="trends" ? buildTrends() : buildMods(); }
function refreshDash() { if(cur.gi!==null) renderMain(); }

// ── TRENDS TAB ───────────────────────────────────────
function buildTrends() {
  const e = eng();
  const trends = e.trends||[];

  let html=`
    <div class="sec-hdr">
      <h4>Trends &amp; Actions</h4>
      <div class="ftabs">
        ${["ALL","OPEN","CLOSED","OVERDUE"].map(f=>
          `<button class="ft ${ui.filter===f?"active":""}" onclick="setFilter('${f}')">${f[0]+f.slice(1).toLowerCase()}</button>`
        ).join("")}
      </div>
    </div>
    <div class="coll-t ${ui.addTrendOpen?"open":""}" onclick="toggleAddTrend()">
      <span>+ Add New Trend</span><span class="arr">▶</span>
    </div>
    <div class="coll-b ${ui.addTrendOpen?"open":""}">
      <label class="fl-lbl">Trend Type</label>
      <input type="text" id="new-trend" placeholder="e.g. Oil Consumption, Vibration…" style="width:100%;margin-bottom:10px;">
      <button class="btn btn-p btn-sm" onclick="addTrend()">+ Add Trend</button>
    </div>`;

  if (!trends.length) return html+`<div class="empty-s"><div class="ei">📋</div><h3>No trends recorded</h3><p>Add a trend above.</p></div>`;

  trends.forEach((t, ti) => {
    const isClosed=!!t.closed, isEd=!!ui.editTrend[ti];
    const shown=(t.actions||[]).map((a,ai)=>({a,ai})).filter(({a})=>ui.filter==="ALL"||status(a).toUpperCase()===ui.filter);

    // details
    let det="";
    if(isEd){
      det=`<div class="td-wrap"><div class="td-grid">
        <div class="td-full"><label class="fl-lbl">Trend Description</label><textarea class="fl-inp" id="td-d-${ti}">${esc(t.description||"")}</textarea></div>
        <div><label class="fl-lbl">Affected Parts / Component</label><input type="text" class="fl-inp" id="td-p-${ti}" value="${esc(t.affectedParts||"")}"></div>
        <div><label class="fl-lbl">Aircraft / Tail No.</label><input type="text" class="fl-inp" id="td-a-${ti}" value="${esc(t.aircraft||"")}"></div>
        <div class="td-full"><label class="fl-lbl">Recommendations</label><textarea class="fl-inp" id="td-r-${ti}">${esc(t.recommendations||"")}</textarea></div>
      </div></div>
      <div class="edit-btns">
        <button class="btn btn-p btn-sm" onclick="saveTD(${ti})">✓ Save</button>
        <button class="btn btn-g btn-sm" onclick="cancelTD(${ti})">Cancel</button>
      </div>`;
    } else {
      const row=(lbl,v)=>`<div><label class="fl-lbl">${lbl}</label><div class="vv ${!v?"empty":""}">${v?esc(v):"Not set"}</div></div>`;
      det=`<div class="td-wrap"><div class="td-grid">
        <div class="td-full"><label class="fl-lbl">Trend Description</label><div class="vv ${!t.description?"empty":""}">${t.description?esc(t.description):"Not set"}</div></div>
        ${row("Affected Parts / Component",t.affectedParts)}
        ${row("Aircraft / Tail No.",t.aircraft)}
        <div class="td-full"><label class="fl-lbl">Recommendations</label><div class="vv ${!t.recommendations?"empty":""}">${t.recommendations?esc(t.recommendations):"Not set"}</div></div>
      </div></div>
      ${!isClosed?`<div class="edit-btns"><button class="btn btn-g btn-sm" onclick="startTD(${ti})">✏️ Edit Details</button></div>`:""}`;
    }

    // actions
    let acts="";
    if(!shown.length){
      acts=`<div style="padding:8px 0;font-size:12px;color:var(--mu);font-style:italic;">No ${ui.filter.toLowerCase()} actions.</div>`;
    } else {
      shown.forEach(({a,ai})=>{
        const s=status(a), key=`${ti}_${ai}`, exp=!!ui.expandAct[key], eda=!!ui.editAct[key];
        let resp=`<div class="resp-list">`;
        (a.responses||[]).forEach((r,ri)=>{
          resp+=`<div class="resp-row"><span class="resp-arr">↳</span><span class="resp-txt">${esc(r.text)}</span><span class="resp-dt">${r.date}</span><button class="del-r" onclick="delResp(${ti},${ai},${ri})">✕</button></div>`;
        });
        resp+=`</div>`;
        if(!isClosed) resp+=`<div class="add-resp"><input type="text" id="ri-${key}" placeholder="Add response…"><button class="btn btn-g btn-sm" onclick="addResp(${ti},${ai})">+ Response</button></div>`;

        const ef=!isClosed?`<div class="act-edit ${eda?"open":""}"><div><label class="fl-lbl">Action Text</label><input type="text" id="ea-a-${key}" value="${esc(a.action)}" style="width:100%"></div><div><label class="fl-lbl">Due Date</label><input type="date" id="ea-d-${key}" value="${a.dueDate||""}"></div><div style="align-self:flex-end"><button class="btn btn-g btn-sm" onclick="saveAE(${ti},${ai})">Save</button></div></div>`:"";

        acts+=`<div class="act-blk">
          <div class="act-hdr" onclick="toggleAct('${key}')">
            <div class="sdot ${s}"></div>
            <div class="act-txt">${esc(a.action)}</div>
            <span class="sbdg ${s}">${s.toUpperCase()}</span>
            ${!isClosed?`<button class="ibtn" onclick="event.stopPropagation();delAction(${ti},${ai})">🗑</button>`:""}
          </div>
          <div class="act-exp ${exp?"open":""}">
            <div class="act-body">
              <div class="act-meta">
                <span class="mtag">📅 ${a.date}</span>
                ${a.dueDate?`<span class="mtag">⏰ Due: ${a.dueDate}</span>`:""}
                ${a.reference?`<span class="mtag">🔗 ${esc(a.reference)}</span>`:""}
              </div>
              ${resp}
            </div>
            ${!isClosed?`<div class="act-btns"><button class="btn btn-g btn-sm" onclick="toggleAE('${key}')">✏️ Edit Action</button></div>`:""}
            ${ef}
          </div>
        </div>`;
      });
    }

    const aOpen=!!ui.addActOpen[ti];
    const addAct=!isClosed?`<div class="add-act-wrap">
      <div class="coll-t ${aOpen?"open":""}" onclick="toggleAddAct(${ti})" style="margin-bottom:${aOpen?8:0}px;">
        <span>+ Add Action</span><span class="arr">▶</span>
      </div>
      <div class="add-act-body ${aOpen?"open":""}">
        <label class="fl-lbl">Action</label>
        <input type="text" id="na-a-${ti}" placeholder="Describe the action taken" style="width:100%">
        <div class="add-act-grid">
          <div><label class="fl-lbl">Due Date</label><input type="date" id="na-d-${ti}" style="width:100%"></div>
          <div><label class="fl-lbl">Reference</label><input type="text" id="na-r-${ti}" placeholder="Ref #" style="width:100%"></div>
          <div style="align-self:flex-end"><button class="btn btn-p btn-sm" onclick="addAction(${ti})">+ Add</button></div>
        </div>
      </div>
    </div>`:"";

    html+=`<div class="tc ${isClosed?"closed":""}">
      <div class="tc-hdr">
        <span class="tc-title">${esc(t.type)}</span>
        <span class="tc-cnt">${(t.actions||[]).length} action${(t.actions||[]).length!==1?"s":""}</span>
        ${isClosed?`<span class="closed-bdg">✓ CLOSED</span>`:""}
        <div style="margin-left:auto;display:flex;gap:5px;">
          ${!isClosed
            ?`<button class="btn btn-ok btn-sm" onclick="closeTrend(${ti})">✓ Close Trend</button>`
            :`<button class="btn btn-g btn-sm" onclick="reopenTrend(${ti})">↩ Re-open</button>`}
          <button class="btn btn-d btn-sm" onclick="delTrend(${ti})">🗑</button>
        </div>
      </div>
      ${det}
      <div class="act-wrap"><div class="act-t">Actions (${(t.actions||[]).length})</div>${acts}</div>
      ${addAct}
      <div style="height:8px"></div>
    </div>`;
  });
  return html;
}

// ── MODS TAB ────────────────────────────────────────
function buildMods() {
  const e=eng(); if(!e.mods) e.mods=[];
  const topts=["SB","MOD","AD","EO"].map(t=>`<option value="${t}">${t}</option>`).join("");
  let html=`
    <div class="sec-hdr"><h4>Modifications &amp; Service Bulletins</h4></div>
    <div class="coll-t ${ui.addModOpen?"open":""}" onclick="toggleAddMod()">
      <span>+ Add Modification / SB</span><span class="arr">▶</span>
    </div>
    <div class="coll-b ${ui.addModOpen?"open":""}">
      <div class="add-mod-g1">
        <div><label class="fl-lbl">Type</label><select id="mod-type" style="width:100%">${topts}</select></div>
        <div><label class="fl-lbl">Reference No.</label><input type="text" id="mod-ref" placeholder="e.g. SB 72-0123" style="width:100%"></div>
        <div><label class="fl-lbl">Title / Description</label><input type="text" id="mod-ttl" placeholder="Short title" style="width:100%"></div>
        <div><label class="fl-lbl">Date Accomplished</label><input type="date" id="mod-date" style="width:100%"></div>
      </div>
      <div class="add-mod-g2">
        <div><label class="fl-lbl">Accomplished By</label><input type="text" id="mod-by" placeholder="Shop / Person" style="width:100%"></div>
        <div><label class="fl-lbl">Work Order / Ref Doc</label><input type="text" id="mod-wo" placeholder="WO #" style="width:100%"></div>
      </div>
      <div style="margin-bottom:10px"><label class="fl-lbl">Notes</label><textarea id="mod-notes" placeholder="Additional details…" style="width:100%"></textarea></div>
      <button class="btn btn-p btn-sm" onclick="addMod()">+ Add</button>
    </div>`;

  if (!e.mods.length) return html+`<div class="empty-s"><div class="ei">🔧</div><h3>No modifications recorded</h3><p>Add SBs, MODs, ADs, or EOs above.</p></div>`;

  const grp={SB:[],MOD:[],AD:[],EO:[]};
  e.mods.forEach((m,mi)=>{(grp[m.type]||grp.SB).push({m,mi});});
  ["SB","AD","MOD","EO"].forEach(type=>{
    const items=grp[type]; if(!items||!items.length) return;
    html+=`<div class="grp-lbl">${type}s (${items.length})</div>`;
    items.forEach(({m,mi})=>{
      html+=`<div class="mod-card">
        <div class="mod-hdr">
          <span class="tbdg ${m.type}">${m.type}</span>
          <span class="mod-ref">${esc(m.ref)}</span>
          <span class="mod-ttl">${esc(m.title)}</span>
          <button class="ibtn" onclick="delMod(${mi})">🗑</button>
        </div>
        <div class="mod-body">
          <div class="mod-grid">
            <div class="mod-fl"><label>Date Accomplished</label><div class="val">${esc(m.date)||"—"}</div></div>
            <div class="mod-fl"><label>Accomplished By</label><div class="val">${esc(m.by)||"—"}</div></div>
            <div class="mod-fl"><label>Work Order</label><div class="val">${esc(m.wo)||"—"}</div></div>
          </div>
          ${m.notes?`<div class="mod-notes">📝 ${esc(m.notes)}</div>`:""}
        </div>
      </div>`;
    });
  });
  return html;
}

// ── OPERATIONS ──────────────────────────────────────
function addEngine() {
  const model=val("f-model"), pn=val("f-pn"), sn=val("f-sn"), bs=val("f-bs");
  if (!model||!pn||!sn||!bs) {
    const fid=["f-model","f-pn","f-sn","f-bs"].find(i=>!val(i));
    flash(fid,"Required!"); return;
  }
  let g=DB.find(d=>d.description===model);
  if (!g){g={description:model,engines:[]};DB.push(g);}
  if (g.engines.find(e=>e.sn===sn)){flash("f-sn","S/N exists!");return;}
  g.engines.push({pn,sn,bs,trends:[],mods:[]});
  ui.addEngOpen=false;
  save(); renderSidebar();
}

function addTrend() {
  const type=val("new-trend"); if(!type) return;
  if(!eng().trends) eng().trends=[];
  eng().trends.push({type,description:"",affectedParts:"",aircraft:"",recommendations:"",closed:false,actions:[]});
  ui.addTrendOpen=false; save(); renderTab(); renderSidebar();
}
function delTrend(ti){if(!confirm("Delete trend and all its actions?"))return;eng().trends.splice(ti,1);delete ui.editTrend[ti];save();renderTab();renderSidebar();}
function closeTrend(ti){eng().trends[ti].closed=true;save();renderTab();renderSidebar();}
function reopenTrend(ti){eng().trends[ti].closed=false;save();renderTab();renderSidebar();}
function startTD(ti){ui.editTrend[ti]=true;renderTab();}
function cancelTD(ti){delete ui.editTrend[ti];renderTab();}
function saveTD(ti){
  const t=eng().trends[ti];
  t.description=val(`td-d-${ti}`);t.affectedParts=val(`td-p-${ti}`);
  t.aircraft=val(`td-a-${ti}`);t.recommendations=val(`td-r-${ti}`);
  delete ui.editTrend[ti];save();renderTab();
}

function addAction(ti){
  const action=val(`na-a-${ti}`); if(!action) return;
  eng().trends[ti].actions.push({action,dueDate:val(`na-d-${ti}`),reference:val(`na-r-${ti}`),date:today(),responses:[]});
  ui.addActOpen[ti]=false; save(); refreshDash();
}
function delAction(ti,ai){if(!confirm("Delete this action?"))return;eng().trends[ti].actions.splice(ai,1);save();refreshDash();}
function toggleAct(key){ui.expandAct[key]=!ui.expandAct[key];renderTab();}
function toggleAE(key){ui.editAct[key]=!ui.editAct[key];renderTab();}
function saveAE(ti,ai){
  const key=`${ti}_${ai}`,a=eng().trends[ti].actions[ai];
  a.action=val(`ea-a-${key}`);a.dueDate=val(`ea-d-${key}`);
  delete ui.editAct[key];save();refreshDash();
}

function addResp(ti,ai){
  const txt=val(`ri-${ti}_${ai}`); if(!txt) return;
  const a=eng().trends[ti].actions[ai];
  if(!a.responses)a.responses=[];
  a.responses.push({text:txt,date:today()});
  ui.expandAct[`${ti}_${ai}`]=true; save(); refreshDash();
}
function delResp(ti,ai,ri){eng().trends[ti].actions[ai].responses.splice(ri,1);save();refreshDash();}

function addMod(){
  const ref=val("mod-ref"),title=val("mod-ttl");
  if(!ref||!title){alert("Reference and Title required.");return;}
  if(!eng().mods)eng().mods=[];
  eng().mods.push({type:$("mod-type").value,ref,title,date:val("mod-date"),by:val("mod-by"),wo:val("mod-wo"),notes:val("mod-notes")});
  ui.addModOpen=false;save();renderTab();
}
function delMod(mi){if(!confirm("Delete this modification?"))return;eng().mods.splice(mi,1);save();renderTab();}

function toggleAddTrend(){ui.addTrendOpen=!ui.addTrendOpen;renderTab();}
function toggleAddMod(){ui.addModOpen=!ui.addModOpen;renderTab();}
function toggleAddAct(ti){ui.addActOpen[ti]=!ui.addActOpen[ti];renderTab();}
function setFilter(f){ui.filter=f;renderTab();}

function flash(id,msg){
  const el=$(id); if(!el) return;
  const ph=el.placeholder;
  el.style.borderColor="var(--cr)";el.placeholder=msg;
  setTimeout(()=>{el.style.borderColor="";el.placeholder=ph;},2000);
}

// ── INIT ────────────────────────────────────────────
renderSidebar();
</script>
</body>
</html>
